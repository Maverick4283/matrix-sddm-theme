[General]
# ==============================================================================
# MATRIX TRILOGY SDDM THEME - CONFIGURATION FILE
# ==============================================================================
# All settings can be customized here without modifying QML code.
# After changing values, restart SDDM or use test mode to see changes.
# ==============================================================================

# --- MAIN COLORS ---
# Primary Matrix green color (used for symbols, glow, text)
MatrixGreen=#00FF41

# Darker green for symbol tails (fading effect)
MatrixDarkGreen=#003B00

# Background color (pure black recommended for Matrix aesthetic)
BackgroundColor=#000000

# Glow/bloom effect color (usually same as MatrixGreen)
GlowColor=#00FF41

# --- PILL COLORS (Morpheus hands) ---
# Red pill (left monitor, right hand)
RedPillColor=#FF0000
RedPillGlow=#FF4444

# Blue pill (right monitor, left hand)
BluePillColor=#0066FF
BluePillGlow=#4488FF

# --- ANIMATION TIMING ---
# Time offset for left monitor (creates variation between screens)
LeftMonitorTimeOffset=20

# Time offset for center monitor
CenterMonitorTimeOffset=60

# Time offset for right monitor
RightMonitorTimeOffset=40

# --- MATRIX RAIN SETTINGS ---
# Base falling speed multiplier (1.0 = default)
FallSpeed=1.0

# Depth/flying-through effect speed (0.0 = disabled, 1.0 = default)
DepthSpeed=0.5

# How fast symbols change in the tail (0.0-1.0)
SymbolChangeRate=0.3

# Symbol brightness at the head of each column (0.0-1.0)
HeadBrightness=1.0

# Symbol brightness at the tail (0.0-1.0)
TailBrightness=0.2

# Glow intensity around bright symbols (0.0-1.0)
GlowIntensity=0.6

# Number of symbol columns density (higher = more columns)
ColumnDensity=1.0

# --- INTRO SEQUENCE ---
# Enable "Wake up, Neo..." intro animation
IntroEnabled=true

# Total intro duration in seconds (before login box appears)
IntroDuration=6

# Typing speed in milliseconds per character
TypewriterSpeed=50

# Allow skipping intro with any key/mouse click
IntroSkippable=true

# Intro text lines (separated by | character)
IntroText=Wake up, Neo...|The Matrix has you...|Follow the white rabbit...

# --- QUOTES ---
# Enable rotating quotes at the bottom of login screen
QuotesEnabled=true

# Interval between quote changes in seconds
QuoteChangeInterval=5

# Quote typing animation speed (ms per character)
QuoteTypingSpeed=30

# Quotes list (format: "quote text" - Author | next quote | ...)
Quotes="There is no spoon." - Neo|"Free your mind." - Morpheus|"Welcome to the real world." - Morpheus|"The Matrix has you." - Trinity|"I know kung fu." - Neo|"Dodge this." - Trinity|"What is real?" - Morpheus|"Choice. The problem is choice." - Neo

# --- LOGIN BOX ---
# Login box background opacity (0.0 = transparent, 1.0 = solid)
LoginBoxOpacity=0.85

# Login box border color
LoginBoxBorderColor=#00FF41

# Login box border width in pixels
LoginBoxBorderWidth=2

# Show user avatar made of Matrix symbols
ShowMatrixAvatar=true

# --- PASSWORD FIELD ---
# Character style for password masking
# Options: "katakana" (random Japanese), "asterisk" (*), "bullet" (●), "block" (█)
PasswordCharStyle=katakana

# --- CLOCK ---
# Show clock above login box
ShowClock=true

# Clock format (use Qt time format: hh:mm:ss, HH:mm, etc.)
ClockFormat=HH:mm:ss

# Date format (use Qt date format: yyyy.MM.dd, dd/MM/yyyy, etc.)
DateFormat=yyyy.MM.dd

# --- HANDS (Side monitors) ---
# Enable Morpheus hands on side monitors
HandsEnabled=true

# Hand "breathing" animation speed (0.0 = static, 1.0 = default)
HandBreathingSpeed=1.0

# Hand symbol density (higher = more detailed)
HandSymbolDensity=1.0

# --- FONTS ---
# Main Matrix code font (must be in fonts/ folder)
MatrixFont=matrix-code.ttf

# UI font for labels and text
UIFont=JetBrains Mono

# Fallback font if Matrix font not found
FallbackFont=Noto Sans Mono

# --- MULTI-MONITOR ---
# Automatically detect and configure multiple monitors
AutoDetectMonitors=true

# Force specific monitor layout (leave empty for auto)
# Format: "left,center,right" or "single"
ForceLayout=

# --- PERFORMANCE ---
# Shader quality (low, medium, high, ultra)
ShaderQuality=high

# Enable glow/bloom post-processing (disable for better performance)
EnableGlow=true

# Target frame rate (30, 60, or 0 for unlimited)
TargetFPS=60